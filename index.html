<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CodePen - Full-Screen Responsive Image Slider</title>
  <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css'>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap");

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Lexend", sans-serif;
      background-color: #362a2b;
      color: #e5ebf3;
    }

    .slider {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.4s ease-in-out;
    }

    .slide.current 
    /* This forces all slides to show the full image */
    .slide {
      background-size: contain !important;
      background-color: #362a2b; /* Matches your background so the empty space isn't distracting */
    }{
      opacity: 1;
    }

    /* Note: The hardcoded background images were removed from here */

    .buttons button#prev {
      position: absolute;
      top: 50%;
      left: 1rem;
    }

    .buttons button#next {
      position: absolute;
      top: 50%;
      right: 1rem;
    }

    .buttons button {
      border: 2px solid #e5ebf3;
      background-color: transparent;
      color: #e5ebf3;
      cursor: pointer;
      padding: 13px 15px;
      border-radius: 50%;
      outline: none;
    }

    .buttons button:hover {
      background-color: #e5ebf3;
      color: #362a2b;
    }

    @media (min-width: 640px) and (min-height: 640px) {
      .slide .content {
        bottom: 70px;
        left: -600px;
        width: 600px;
        padding: 2rem;
        line-height: 1.6;
      }

      .slide .content h1 {
        font-size: 2rem;
      }

      .slide.current .content {
        transform: translateX(600px);
      }
    }
  </style>
</head>

<body>
  <div class="slider" id="slider"></div>
  
  <div class="buttons" id="buttons">
    <button id="prev"><i class="fas fa-arrow-left"></i></button>
    <button id="next"><i class="fas fa-arrow-right"></i></button>
  </div>

  <script>
    const slider = document.getElementById("slider");
    const nextButton = document.getElementById("next");
    const prevButton = document.getElementById("prev");
    const buttonContainer = document.getElementById("buttons");
    
    const auto = true;
    const intervalTime = 5000;
    let slideInterval;
    let slides = [];

    // 1. Fetch files directly from your GitHub repository
    async function loadDynamicImages() {
      try {
        // Using your public repo details from the previous screenshots
        const response = await fetch("https://api.github.com/repos/sureley/notion_widgets/contents/");
        const files = await response.json();

        // 2. Filter out anything that isn't an image file
        const images = files.filter(file => file.name.match(/\.(png|jpe?g|gif|webp)$/i));

        // 3. Randomize (shuffle) the order of the images
        for (let i = images.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [images[i], images[j]] = [images[j], images[i]]; // Swap elements
        }

        // 4. Inject each image into the HTML
        images.forEach((img, index) => {
          const slideDiv = document.createElement("div");
          slideDiv.classList.add("slide");
          
          // Make the first image visible immediately
          if (index === 0) slideDiv.classList.add("current");
          
          // Apply the background image dynamically
          slideDiv.style.background = `url("${img.name}") no-repeat center top/cover`;
          slider.appendChild(slideDiv);
        });

        // 5. Start the carousel logic now that images exist
        initCarousel();

      } catch (error) {
        console.error("Error loading images:", error);
      }
    }

    // Your original button/interval logic wrapped in a function
    function initCarousel() {
      slides = document.querySelectorAll(".slide");
      
      // If there are 1 or 0 images, hide the next/prev buttons
      if (slides.length <= 1) {
        buttonContainer.style.display = "none";
        return;
      }

      const nextSlide = () => {
        const current = document.querySelector(".current");
        current.classList.remove("current");
        if (current.nextElementSibling) {
          current.nextElementSibling.classList.add("current");
        } else {
          slides[0].classList.add("current");
        }
      };

      const prevSlide = () => {
        const current = document.querySelector(".current");
        current.classList.remove("current");
        if (current.previousElementSibling) {
          current.previousElementSibling.classList.add("current");
        } else {
          slides[slides.length - 1].classList.add("current");
        }
      };

      nextButton.addEventListener("click", () => {
        nextSlide();
        if (auto) {
          clearInterval(slideInterval);
          slideInterval = setInterval(nextSlide, intervalTime);
        }
      });

      prevButton.addEventListener("click", () => {
        prevSlide();
        if (auto) {
          clearInterval(slideInterval);
          slideInterval = setInterval(nextSlide, intervalTime);
        }
      });

      if (auto) {
        slideInterval = setInterval(nextSlide, intervalTime);
      }
    }

    // Kick off the loading process
    loadDynamicImages();
  </script>
</body>

</html>
