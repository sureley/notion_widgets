<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Countdown</title>
    <style>
        body {
            font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #191919; /* Custom dark background */
            color: rgba(255, 255, 255, 0.81); /* Light text to contrast the dark background */
        }
        .countdown-container { display: flex; gap: 20px; text-align: center; }
        .time-box { display: flex; flex-direction: column; min-width: 50px; }
        .number { font-size: 2.5rem; font-weight: 600; line-height: 1.2; }
        .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: rgba(255, 255, 255, 0.44); margin-top: 4px; }
    </style>
</head>
<body>
    <div class="countdown-container" id="timer">
        <div style="font-size: 1rem; color: rgba(255, 255, 255, 0.44);">Loading...</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const dateParam = urlParams.get('date');
            const targetDateString = dateParam ? dateParam : '2027-09-01T00:00:00';
            const countDownDate = new Date(targetDateString).getTime();
            const timerElement = document.getElementById("timer");

            if (!timerElement) return;

            const updateTimer = setInterval(function() {
                const now = new Date().getTime();
                const distance = countDownDate - now;

                if (distance < 0) {
                    clearInterval(updateTimer);
                    timerElement.innerHTML = "<div class='number'>00:00:00</div>";
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                timerElement.innerHTML = `
                    <div class="time-box"><span class="number">${days}</span><span class="label">Days</span></div>
                    <div class="time-box"><span class="number">${hours.toString().padStart(2, '0')}</span><span class="label">Hrs</span></div>
                    <div class="time-box"><span class="number">${minutes.toString().padStart(2, '0')}</span><span class="label">Min</span></div>
                    <div class="time-box"><span class="number">${seconds.toString().padStart(2, '0')}</span><span class="label">Sec</span></div>
                `;
            }, 1000);
        });
    </script>
</body>
</html>
