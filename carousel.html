<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Curated Image Slider</title>
  <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css'>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap");

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Lexend", sans-serif;
      background-color: #191919;
      color: #e5ebf3;
      min-height: 100vh; 
    }

    .slider {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.4s ease-in-out;
      background-size: contain !important;
      background-color: #191919;
    }

    .slide.current {
      opacity: 1;
    }

    /* --- HOVER VISIBILITY LOGIC --- */
    .buttons, .toggle-container {
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
      z-index: 10;
    }

    body:hover .buttons, 
    body:hover .toggle-container {
      opacity: 1;
    }

    /* --- FILENAME BADGE --- */
    .filename-badge {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(50, 50, 50, 0.8);
      border: 1px solid #e5ebf3;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
      pointer-events: none;
      z-index: 10;
    }

    body:hover .slide.current .filename-badge {
      opacity: 1;
    }

    /* --- ARROW BUTTONS --- */
    .buttons button#prev {
      position: absolute;
      top: 50%;
      left: 1rem;
      transform: translateY(-50%);
    }

    .buttons button#next {
      position: absolute;
      top: 50%;
      right: 1rem;
      transform: translateY(-50%);
    }

    .buttons button {
      background-color: rgba(50, 50, 50, 0.8); 
      border: 2px solid #e5ebf3;
      color: #e5ebf3;
      cursor: pointer;
      padding: 13px 15px;
      border-radius: 50%;
      outline: none;
      transition: all 0.2s;
    }

    .buttons button:hover {
      background-color: #e5ebf3;
      color: #191919;
    }

    /* --- TOGGLE SWITCH CONTAINER --- */
    .toggle-container {
      position: absolute;
      top: 20px;
      right: 20px;
      background-color: rgba(50, 50, 50, 0.8);
      padding: 8px 12px;
      border-radius: 30px;
      border: 1px solid #e5ebf3;
      display: flex;
      align-items: center;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 22px;
    }
    .switch input { 
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider-round {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #777;
      transition: .4s;
      border-radius: 24px;
    }
    .slider-round:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider-round {
      background-color: #e5ebf3;
    }
    input:checked + .slider-round:before {
      transform: translateX(22px);
      background-color: #323232;
    }
  </style>
</head>

<body>
  <div class="slider" id="slider"></div>
  
  <div class="buttons" id="buttons">
    <button id="prev"><i class="fas fa-arrow-left"></i></button>
    <button id="next"><i class="fas fa-arrow-right"></i></button>
  </div>

  <div class="toggle-container">
    <label class="switch">
      <input type="checkbox" id="fav-toggle">
      <span class="slider-round"></span>
    </label>
  </div>
