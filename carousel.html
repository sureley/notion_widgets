<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Dynamic sequential Image Slider with containment Fix for Notion</title>
  <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css'>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap");

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Lexend", sans-serif;
      background-color: #362a2b;
      color: #e5ebf3;
    }

    .slider {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.4s ease-in-out;
    }

    .slide.current {
      opacity: 1;
    }

    /* --- Synthesized original size fix for Notion --- */
    /* This forces all dynamically generated slides to show the full image without zooming */
    .slide {
      /* Uses contain instead of cover for scaling, reinforced with background color so empty space matches */
      background-size: contain !important; 
      background-color: #362a2b; /* Matches your background theme */
    }
    /* ---------------------------------------------------- */

    .buttons button#prev {
      position: absolute;
      top: 50%;
      left: 1rem;
    }

    .buttons button#next {
      position: absolute;
      top: 50%;
      right: 1rem;
    }

    .buttons button {
      border: 2px solid #e5ebf3;
      background-color: transparent;
      color: #e5ebf3;
      cursor: pointer;
      padding: 13px 15px;
      border-radius: 50%;
      outline: none;
    }

    .buttons button:hover {
      background-color: #e5ebf3;
      color: #362a2b;
    }

    @media (min-width: 640px) and (min-height: 640px) {
      .slide .content {
        bottom: 70px;
        left: -600px;
        width: 600px;
        padding: 2rem;
        line-height: 1.6;
      }

      .slide .content h1 {
        font-size: 2rem;
      }

      .slide.current .content {
        transform: translateX(600px);
      }
    }
  </style>
</head>

<body>
  <div class="slider" id="slider"></div>
  
  <div class="buttons" id="buttons">
    <button id="prev"><i class="fas fa-arrow-left"></i></button>
    <button id="next"><i class="fas fa-arrow-right"></i></button>
  </div>

  <script>
    const slider = document.getElementById("slider");
    const nextButton = document.getElementById("next");
    const prevButton = document.getElementById("prev");
    const buttonContainer = document.getElementById("buttons");
    
    const auto = true;
    const intervalTime = 5000;
    let slideInterval;
    let slides = [];

    // --- Synthesised Parameterization: Read folder from URL parameter ---
    // Get the query parameters from the URL (e.g., carousel.html?folder=art)
    const urlParams = new URLSearchParams(window.location.search);
    const folder = urlParams.get('folder') || ''; // Default to root if no folder parameter is specified
    console.log(`Loading images from folder: "${folder}"`);
    // ----------------------------------------------------------------------

    // Fetch files directly from your GitHub repository, only from the specified folder path
    async function loadDynamicImages() {
      try {
        // Construct the correct path for GitHub API contents dynamic fetch
        const apiPath = folder ? `${folder}/` : ''; // Add slash if folder specified
        const apiUrl = `https://api.github.com/repos/sureley/notion_widgets/contents/${apiPath}`;
        
        // Fetch files from that specific dynamic URL
        const response = await fetch(apiUrl);
        if (!response.ok) {
            console.error(`Failed to fetch from: ${apiUrl}. Check folder parameter.`);
            return;
        }
        const files = await response.json();

        // 2. Filter out anything that isn't an image file
        const images = files.filter(file => file.name.match(/\.(png|jpe?g|gif|webp)$/i));
        console.log(`Found ${images.length} images in "${folder}" folder.`);

        // 3. Randomize (shuffle) the order of the images for fresh display
        for (let i = images.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [images[i], images[j]] = [images[j], images[i]]; // Swap elements
        }

        // 4. Inject each image into the HTML, ensuring correct sizing and color
        images.forEach((img, index) => {
          const slideDiv = document.createElement("div");
          slideDiv.classList.add("slide");
          
          // Make the first image visible immediately
          if (index === 0) slideDiv.classList.add("current");
          
          // Apply the background image dynamically - *CRITICAL:* use /contain #362a2b shorthand here as well
          // The containment ensures original size scaling without zoom for Notion, and background color fills empty space
          // Use img.path to get the full path including folder (e.g., art/1.png) for image source
          slideDiv.style.background = `url("${img.path}") no-repeat center top / contain #362a2b`;
          slider.appendChild(slideDiv);
        });

        // 5. Start the carousel logic now that dynamic images exist
        if (images.length > 0) {
            initCarousel();
        } else {
            console.warn("No images found to display.");
        }

      } catch (error) {
        console.error("Error loading dynamically parameterised images:", error);
      }
    }

    // Carousel button/interval logic wrapped in a function
    function initCarousel() {
      slides = document.querySelectorAll(".slide");
      
      // If there are 1 or 0 images, hide the next/prev buttons and return
      if (slides.length <= 1) {
        buttonContainer.style.display = "none";
        return;
      }

      const nextSlide = () => {
        const current = document.querySelector(".current");
        current.classList.remove("current");
        if (current.nextElementSibling) {
          current.nextElementSibling.classList.add("current");
        } else {
          slides[0].classList.add("current");
        }
      };

      const prevSlide = () => {
        const current = document.querySelector(".current");
        current.classList.remove("current");
        if (current.previousElementSibling) {
          current.previousElementSibling.classList.add("current");
        } else {
          slides[slides.length - 1].classList.add("current");
        }
      };

      nextButton.addEventListener("click", () => {
        nextSlide();
        if (auto) {
          clearInterval(slideInterval);
          slideInterval = setInterval(nextSlide, intervalTime);
        }
      });

      prevButton.addEventListener("click", () => {
        prevSlide();
        if (auto) {
          clearInterval(slideInterval);
          slideInterval = setInterval(nextSlide, intervalTime);
        }
      });

      if (auto) {
        slideInterval = setInterval(nextSlide, intervalTime);
      }
    }

    // Kick off the loading process using synthesized logic
    loadDynamicImages();
  </script>
</body>

</html>
